name: Save Session
on:
  workflow_dispatch:

jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Save WA_SESSION
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # session folder మాత్రమే తీసుకోండి
          ls -la .wwebjs_auth/
          
          # session folder size చూడండి
          du -sh .wwebjs_auth/
          
          # zip చేయండి
          tar -czf wa_session.tar.gz -C .wwebjs_auth .
          
          # size check చేయండి
          ls -lh wa_session.tar.gz
          
          # secret set చేయండి
          gh secret set WA_SESSION < <(base64 -w 0 wa_session.tar.gz)
          
          echo "✅ Done!"
