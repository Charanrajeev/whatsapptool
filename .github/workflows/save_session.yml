name: Save Session
on:
  workflow_dispatch:

jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Save WA_SESSION
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # session folder contents చూడండి
          echo "=== Session folder ==="
          ls -la .wwebjs_auth/session/
          
          # Default file మాత్రమే తీసుకోండి (main session file)
          echo "=== File sizes ==="
          du -sh .wwebjs_auth/session/* 2>/dev/null | sort -h
          
          # session.json లేదా Default file మాత్రమే zip చేయండి
          mkdir -p clean_session/session
          
          # Important files మాత్రమే copy చేయండి
          cp .wwebjs_auth/session/Default .wwebjs_auth/session/*.json clean_session/session/ 2>/dev/null || true
          cp -r .wwebjs_auth/session/Default clean_session/session/ 2>/dev/null || true
          
          echo "=== Clean session size ==="
          du -sh clean_session/
          
          # zip చేయండి
          tar -czf wa_session.tar.gz -C clean_session .
          ls -lh wa_session.tar.gz
          
          # secret set చేయండి
          gh secret set WA_SESSION < <(base64 -w 0 wa_session.tar.gz)
          
          echo "✅ Done!"
