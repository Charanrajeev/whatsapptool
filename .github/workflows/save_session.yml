name: Save Session
on:
  workflow_dispatch:

jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install gh cli & Save WA_SESSION
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Session zip చేయండి
          tar -czf wa_session.tar.gz -C .wwebjs_auth .
          
          # Base64 చేయండి — file గా save చేయండి
          base64 wa_session.tar.gz > session_b64.txt
          
          # GitHub CLI తో secret set చేయండి
          gh secret set WA_SESSION < session_b64.txt
          
          echo "✅ WA_SESSION saved successfully!"
