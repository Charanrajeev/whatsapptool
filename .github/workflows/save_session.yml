name: Save Session
on:
  workflow_dispatch:

jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Create Session Archive
        run: |
          tar -czf wa_session.tar.gz -C .wwebjs_auth .
          echo "SESSION_B64=$(base64 wa_session.tar.gz | tr -d '\n')" >> $GITHUB_ENV

      - name: Save WA_SESSION Secret
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const value = process.env.SESSION_B64;
            
            const { data: key } = await github.rest.actions.getRepoPublicKey({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            
            // libsodium use చేస్తాం — tweetsodium వద్దు
            const _sodium = require('libsodium-wrappers');
            await _sodium.ready;
            const sodium = _sodium;
            
            const keyBytes = sodium.from_base64(key.key, sodium.base64_variants.ORIGINAL);
            const msgBytes = sodium.from_string(value);
            const encrypted = sodium.to_base64(
              sodium.crypto_box_seal(msgBytes, keyBytes),
              sodium.base64_variants.ORIGINAL
            );
            
            await github.rest.actions.createOrUpdateRepoSecret({
              owner: context.repo.owner,
              repo: context.repo.repo,
              secret_name: 'WA_SESSION',
              encrypted_value: encrypted,
              key_id: key.key_id,
            });
            
            console.log('✅ WA_SESSION secret saved successfully!');
        env:
          SESSION_B64: ${{ env.SESSION_B64 }}
