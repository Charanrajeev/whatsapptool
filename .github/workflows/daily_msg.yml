name: Daily WhatsApp Messages
on:
  repository_dispatch:
    types: [send-whatsapp]
  workflow_dispatch:
    inputs:
      sheet_id:
        description: 'Google Sheet ID'
        required: false
      sheet_name:
        description: 'Sheet Name'
        required: false
      phone_column:
        description: 'Phone Number Column Name'
        required: false
      message_column:
        description: 'Message Column Name'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Dependencies
        run: npm install

      - name: Run Script
        env:
          SHEET_ID: ${{ github.event.client_payload.sheet_id || inputs.sheet_id || secrets.DEFAULT_SHEET_ID }}
          SHEET_NAME: ${{ github.event.client_payload.sheet_name || inputs.sheet_name || 'Sheet1' }}
          PHONE_COLUMN: ${{ github.event.client_payload.phone_column || inputs.phone_column || 'Mobile Number' }}
          MESSAGE_COLUMN: ${{ github.event.client_payload.message_column || inputs.message_column || 'Message' }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: node index.js

      - name: Save Session to Repo
        if: always()
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -f .wwebjs_auth/ .wwebjs_cache/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update WhatsApp session"
          git push
