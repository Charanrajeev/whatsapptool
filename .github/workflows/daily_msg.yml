name: Daily WhatsApp Messages
on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Dependencies
        run: npm install

      - name: Run Script
        env:
          GOOGLE_JSON: ${{ secrets.GOOGLE_JSON }} # ఇది మీ Secrets నుండి వస్తుంది
        run: node index.js
